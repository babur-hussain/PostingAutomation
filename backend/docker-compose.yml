version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: posting-automation-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  redis:
    image: redis:7-alpine
    container_name: posting-automation-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass "${REDIS_PASSWORD:-}"
